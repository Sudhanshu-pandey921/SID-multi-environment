trigger:
  branches:
    include:
      - main
      - develop
      - feature/*
  paths:
    include:
      - SID-multi-environment/**
    exclude:
      - README.md
      - docs/**

pr:
  branches:
    include:
      - main
      - develop

schedules:
  - cron: "0 3 * * *"
    displayName: Daily Run
    branches:
      include:
        - main
    always: false

parameters:
  - name: environment
    displayName: Select Environment
    type: string
    default: dev
    values:
      - dev
      - test
      - prod

variables:
  tf_version: '1.6.0'
  workingDir: 'SID-multi-environment'

pool: may-pool

stages:

# ------------------ INIT ------------------
- stage: Init
  jobs:
    - job: terraform_init
      steps:

        # 🔥 FIX START
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: $(tf_version)

        - powershell: terraform version
          displayName: Verify Terraform Installed
        # 🔥 FIX END

        - task: TerraformTask@5
          displayName: Init
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: $(workingDir)
            backendServiceArm: 'may-sc'
            backendAzureRmStorageAccountName: 'maystg12'
            backendAzureRmContainerName: 'maycnt12'
            backendAzureRmKey: '${{ parameters.environment }}.tfstate'


# ------------------ PLAN ------------------
- stage: Plan
  dependsOn: Init
  jobs:
    - job: terraform_plan
      steps:

        # 🔥 FIX START
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: $(tf_version)

        - powershell: terraform version
          displayName: Verify Terraform Installed
        # 🔥 FIX END

        - task: TerraformTask@5
          displayName: Init (Plan Stage)
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: $(workingDir)
            backendServiceArm: 'may-sc'
            backendAzureRmStorageAccountName: 'maystg12'
            backendAzureRmContainerName: 'maycnt12'
            backendAzureRmKey: '${{ parameters.environment }}.tfstate'

        - task: TerraformTask@5
          displayName: Plan
          inputs:
            provider: 'azurerm'
            command: 'plan'
            workingDirectory: $(workingDir)
            environmentServiceNameAzureRM: 'may-sc'
            commandOptions: "-var-file=environments/${{ parameters.environment }}.tfvars"


# ------------------ APPLY ------------------
- stage: Apply
  dependsOn: Plan
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
    - job: terraform_apply
      steps:

        # 🔥 FIX START
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: $(tf_version)

        - powershell: terraform version
          displayName: Verify Terraform Installed
        # 🔥 FIX END

        - task: TerraformTask@5
          displayName: Init (Apply Stage)
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: $(workingDir)
            backendServiceArm: 'may-sc'
            backendAzureRmStorageAccountName: 'maystg12'
            backendAzureRmContainerName: 'maycnt12'
            backendAzureRmKey: '${{ parameters.environment }}.tfstate'

        - task: TerraformTask@5
          displayName: Apply
          inputs:
            provider: 'azurerm'
            command: 'apply'
            workingDirectory: $(workingDir)
            environmentServiceNameAzureRM: 'may-sc'
            commandOptions: "-var-file=environments/${{ parameters.environment }}.tfvars -auto-approve"
trigger:
  branches:
    include:
      - main
      - develop
      - feature/*
  paths:
    include:
      - SID-multi-environment/**
    exclude:
      - README.md
      - docs/**

pr:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - SID-multi-environment/**
    exclude:
      - docs/**

parameters:
  - name: environment
    type: string
    default: dev
    values:
      - dev
      - stage
      - prod

variables:
  - name: tfVersion
    value: '1.5.7'

  - name: serviceConnection
    value: 'may-sc'

  # ✅ FIXED PATH (IMPORTANT)
  - name: workingDir
    value: 'SID-multi-environment'

  - name: backendResourceGroup
    value: 'tf-backend-rg'

  - name: backendStorageAccount
    value: 'tfbackendstorage123'

  - name: backendContainer
    value: 'tfstate'

  - name: backendKey
    value: '${{ parameters.environment }}.tfstate'

# ✅ FIXED POOL SYNTAX
pool:
  name: may-pool

stages:

# ---------------------------
# VALIDATION
# ---------------------------
- stage: Validate
  jobs:
    - job: ValidateJob
      steps:

        - task: TerraformInstaller@1
          inputs:
            terraformVersion: $(tfVersion)

        - script: terraform init -backend=false
          workingDirectory: $(workingDir)

        - script: terraform fmt -check
          workingDirectory: $(workingDir)

        - script: terraform validate
          workingDirectory: $(workingDir)


# ---------------------------
# PLAN
# ---------------------------
- stage: Plan
  dependsOn: Validate
  jobs:
    - job: PlanJob
      steps:

        - task: TerraformInstaller@1
          inputs:
            terraformVersion: $(tfVersion)

        - task: AzureCLI@2
          displayName: Terraform Plan
          inputs:
            azureSubscription: $(serviceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              terraform init \
                -backend-config="resource_group_name=$(backendResourceGroup)" \
                -backend-config="storage_account_name=$(backendStorageAccount)" \
                -backend-config="container_name=$(backendContainer)" \
                -backend-config="key=$(backendKey)"

              terraform plan -out=tfplan
            workingDirectory: $(workingDir)

        - publish: $(workingDir)/tfplan
          artifact: tfplan


# ---------------------------
# APPLY NON PROD
# ---------------------------
- stage: Apply_NonProd
  dependsOn: Plan
  condition: and(succeeded(), ne('${{ parameters.environment }}', 'prod'))
  jobs:
    - deployment: ApplyJob
      environment: ${{ parameters.environment }}
      strategy:
        runOnce:
          deploy:
            steps:

              - download: current
                artifact: tfplan

              - task: TerraformInstaller@1
                inputs:
                  terraformVersion: $(tfVersion)

              - task: AzureCLI@2
                displayName: Terraform Apply
                inputs:
                  azureSubscription: $(serviceConnection)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    terraform init \
                      -backend-config="resource_group_name=$(backendResourceGroup)" \
                      -backend-config="storage_account_name=$(backendStorageAccount)" \
                      -backend-config="container_name=$(backendContainer)" \
                      -backend-config="key=$(backendKey)"

                    terraform apply -auto-approve tfplan
                  workingDirectory: $(workingDir)


# ---------------------------
# APPLY PROD (APPROVAL)
# ---------------------------
- stage: Apply_Prod
  dependsOn: Plan
  condition: and(succeeded(), eq('${{ parameters.environment }}', 'prod'))

  jobs:
    - deployment: ProdDeployment
      environment: prod
      strategy:
        runOnce:
          deploy:
            steps:

              - download: current
                artifact: tfplan

              - task: TerraformInstaller@1
                inputs:
                  terraformVersion: $(tfVersion)

              - task: AzureCLI@2
                displayName: Terraform Apply Prod
                inputs:
                  azureSubscription: $(serviceConnection)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    terraform init \
                      -backend-config="resource_group_name=$(backendResourceGroup)" \
                      -backend-config="storage_account_name=$(backendStorageAccount)" \
                      -backend-config="container_name=$(backendContainer)" \
                      -backend-config="key=$(backendKey)"

                    terraform apply tfplan
                  workingDirectory: $(workingDir)